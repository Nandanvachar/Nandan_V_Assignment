<!DOCTYPE html>
<html>
<head>
    <title>Simple Keylogger Demo</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid black;
            width: 300px;
            min-height: 50px;
        }
    </style>
</head>

<body>

<h2>Keylogger Demonstration</h2>

<!-- Input field -->
<input type="text" id="inputBox" placeholder="Type something here...">

<!-- Display captured keys -->
<div id="output"></div>

<script>
    let capturedKeys = "";

    // Capture key presses
    document.getElementById("inputBox").addEventListener("keypress", function(event) {
        capturedKeys += event.key;
        document.getElementById("output").innerText = capturedKeys;
    });
</script>

</body>
</html>
